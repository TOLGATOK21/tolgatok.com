name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'
          cache: true

      - name: Create API keys file
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "class ApiKeys { static const String geminiApiKey = '$GEMINI_KEY'; }" > lib/config/api_keys.dart

      - name: Inject Firebase API key
        env:
          FB_KEY: ${{ secrets.FIREBASE_API_KEY }}
        run: |
          content=$(cat web/index.html)
          echo "${content//FIREBASE_API_KEY_PLACEHOLDER/$FB_KEY}" > web/index.html

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
